services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: regime_engine_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d regime_engine_test"]
      interval: 2s
      timeout: 5s
      retries: 10
